<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign Up | Hyperlocal Booking</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">Hyperlocal Booking</a>
    <div class="ms-auto">
      <a class="btn btn-outline-light btn-sm" href="/login">Login</a>
    </div>
  </div>
</nav>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
      <div class="card shadow border-0">
        <div class="card-body p-4">
          <h2 class="h4 fw-bold mb-1">Create an Account</h2>
          <p class="text-muted mb-4">Fill in your details to get started.</p>

          <form id="signupForm" class="row g-3">
            <div class="col-md-6">
              <label class="form-label">First Name</label>
              <input id="firstName" class="form-control" type="text" placeholder="First name" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Last Name</label>
              <input id="lastName" class="form-control" type="text" placeholder="Last name" required>
            </div>
            <div class="col-12">
              <label class="form-label">Email</label>
              <input id="email" class="form-control" type="email" placeholder="name@example.com" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Phone</label>
              <input id="phone" class="form-control" type="text" placeholder="Mobile number" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Password</label>
              <input id="password" class="form-control" type="password" placeholder="Min. 6 characters" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Preferred City</label>
              <input id="preferredCity" class="form-control" type="text" placeholder="e.g. Chennai" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Event Type</label>
              <select id="eventType" class="form-select" required>
                <option value="">Select</option>
                <option value="birthday">Birthday</option>
                <option value="wedding">Wedding</option>
                <option value="corporate">Corporate</option>
                <option value="social">Social</option>
                <option value="other">Other</option>
              </select>
            </div>
            <div class="col-12 d-grid">
              <button class="btn btn-primary btn-lg" type="submit">Create Account</button>
            </div>
          </form>

          <div id="signupMsg" class="alert mt-3 d-none" role="alert"></div>

          <p class="text-center text-muted mt-3 mb-0">
            Already have an account? <a href="/login">Login</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // Redirect if already logged in
  fetch('/api/auth/me').then(r => r.json()).then(d => {
    if (d.success) window.location.href = '/search';
  }).catch(() => {});

  function showMsg(text, type) {
    const el = document.getElementById('signupMsg');
    el.className = `alert alert-${type}`;
    el.textContent = text;
    el.classList.remove('d-none');
  }

  document.getElementById('signupForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const payload = {
      firstName:     document.getElementById('firstName').value.trim(),
      lastName:      document.getElementById('lastName').value.trim(),
      email:         document.getElementById('email').value.trim(),
      phone:         document.getElementById('phone').value.trim(),
      password:      document.getElementById('password').value,
      preferredCity: document.getElementById('preferredCity').value.trim(),
      eventType:     document.getElementById('eventType').value.trim()
    };

    try {
      const res  = await fetch('/api/auth/signup', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(payload)
      });
      const data = await res.json();

      if (!res.ok) throw new Error(data.message || 'Signup failed.');

      showMsg('Account created! Redirecting…', 'success');
      setTimeout(() => { window.location.href = '/search'; }, 800);

    } catch (err) {
      showMsg(err.message, 'danger');
    }
  });
</script>
</body>
</html>
