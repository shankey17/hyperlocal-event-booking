<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Search Venues | Hyperlocal Event & Venue Booking System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">Hyperlocal Booking</a>
    <div class="ms-auto">
      <a class="btn btn-outline-light btn-sm me-2" href="/">Home</a>
      <a class="btn btn-warning btn-sm" href="/search">Search Venues</a>
    </div>
  </div>
</nav>

<div class="container py-5">
  <div class="d-flex flex-column flex-md-row align-items-md-end justify-content-between mb-4 gap-3">
    <div>
      <span class="badge text-bg-primary mb-2">Search Page</span>
      <h1 class="h2 fw-bold mb-1">Venue Search and Availability</h1>
      <p class="text-muted mb-0">Filter by city, guests, and time slot to view available rooms.</p>
    </div>
    <button class="btn btn-outline-secondary" id="loadAllBtn" type="button">Reset Search</button>
  </div>

  <div class="card shadow border-0 mb-4">
    <div class="card-body">
      <form id="searchForm" class="row g-3">
        <div class="col-md-3">
          <label class="form-label">City</label>
          <input id="city" class="form-control" type="text" placeholder="Kolkata">
        </div>
        <div class="col-md-2">
          <label class="form-label">Guests</label>
          <input id="guests" class="form-control" type="number" min="1" placeholder="100">
        </div>
        <div class="col-md-3">
          <label class="form-label">Start Date & Time</label>
          <input id="start" class="form-control" type="datetime-local" required>
        </div>
        <div class="col-md-3">
          <label class="form-label">End Date & Time</label>
          <input id="end" class="form-control" type="datetime-local" required>
        </div>
        <div class="col-md-2 d-grid">
          <label class="form-label d-none d-md-block">&nbsp;</label>
          <button class="btn btn-primary" type="submit">Search</button>
        </div>
      </form>
      <div class="form-text mt-3">Date and time are required because availability is checked from the RoomReservation table.</div>
    </div>
  </div>

  <div id="statusMsg" class="alert alert-info d-none"></div>
  <div id="venueResults" class="row g-4"></div>
</div>

<script src="app.js"></script>
</body>
</html>
