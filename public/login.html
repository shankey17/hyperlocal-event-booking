<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | Hyperlocal Booking</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">Hyperlocal Booking</a>
    <div class="ms-auto">
      <a class="btn btn-warning btn-sm" href="/signup">Sign Up</a>
    </div>
  </div>
</nav>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="card shadow border-0">
        <div class="card-body p-4">
          <h2 class="h4 fw-bold mb-1">Login</h2>
          <p class="text-muted mb-4">Enter your credentials to continue.</p>

          <form id="loginForm" class="row g-3">
            <div class="col-12">
              <label class="form-label">Email</label>
              <input id="email" class="form-control" type="email" placeholder="name@example.com" required>
            </div>
            <div class="col-12">
              <label class="form-label">Password</label>
              <input id="password" class="form-control" type="password" placeholder="Your password" required>
            </div>
            <div class="col-12 d-grid">
              <button class="btn btn-primary btn-lg" type="submit">Login</button>
            </div>
          </form>

          <div id="loginMsg" class="alert mt-3 d-none" role="alert"></div>

          <p class="text-center text-muted mt-3 mb-0">
            Don't have an account? <a href="/signup">Sign Up</a>
          </p>

          <hr class="my-3">
          <p class="text-muted small text-center mb-1">Demo credentials</p>
          <p class="text-muted small text-center mb-0">
            Email: <code>c1@mail.com</code> &nbsp;|&nbsp; Password: <code>password123</code>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // Redirect if already logged in
  fetch('/api/auth/me').then(r => r.json()).then(d => {
    if (d.success) window.location.href = '/search';
  }).catch(() => {});

  function showMsg(text, type) {
    const el = document.getElementById('loginMsg');
    el.className = `alert alert-${type}`;
    el.textContent = text;
    el.classList.remove('d-none');
  }

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const payload = {
      email:    document.getElementById('email').value.trim(),
      password: document.getElementById('password').value
    };

    try {
      const res  = await fetch('/api/auth/login', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(payload)
      });
      const data = await res.json();

      if (!res.ok) throw new Error(data.message || 'Login failed.');

      showMsg('Login successful! Redirecting…', 'success');
      setTimeout(() => { window.location.href = '/search'; }, 800);

    } catch (err) {
      showMsg(err.message, 'danger');
    }
  });
</script>
</body>
</html>
